<main>
    <form>
    <fieldset>
<legend>Standard Bike Registration</legend>
    <div class="bike">
    <label for="name">First Name:</label>
    <input type="text" name="firstname" placeholder="firstname">
    </div>
    <div class="bike">
        <label for="Middlename"> Middle Name :</label>
        <input type="text" name="Middlename" id="Middlename" placeholder="Middlename">

    </div>
    <div class="bike">
        <label for="LastName"> Last Name :</label>
        <input type="text" name="Lastname" id="Lastname" placeholder="Lastname">   
    </div>
    <div class="bike">
        <label for="age"> Age:</label>
        <input type="number" name="age" id="age">
    </div>
    <div class="bike">
        Gender 
        <label><input type="radio" name="gender" value="gender"> Female</label>
        <label><input type="radio" name="gender" value="gender"> Male</label>
    </div>
    <div class="bike">
        <label for="year in college"> Which year you are in college</label>
        <select name="year in college" id="year in college">
            <option value="blank">-------</option>
            <option value="Freshman">Freshman</option>
            <option value="Sophmore">Sophomore</option>
            <option value="Junior">Junior</option>
            <option value="Senior"> Senior</option>
        </select>

    </div>
    <div class="bike">
        <label for="date">Date of Birth</label>
        <input type="date" name="date" id="date">
    </div>
    <div class="bike">
        <label for="email">Email Id</label>
        <input type="email" name="email" id="email" placeholder="email@gmail.com">
    </div>
    <div class="bike">
        <label for="comments"> Which Bike you Like</label>
        <textarea name="comments" id="comments"></textarea>
    </div>
    <div class="bike">
        <input type="submit" value="submit">
    </div>

</fieldset>
</form>
</main>
